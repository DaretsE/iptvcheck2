name: Update IPTV ranking

on:
  workflow_dispatch:        # запуск вручную из вкладки Actions
  schedule:
    - cron: "0 6 * * *"     # ежедневно в 06:00 UTC

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Generate ranking
        run: python generate.py

      - name: Commit results
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add ranking.json RANKING.md
          git diff --quiet --staged || git commit -m "chore: update IPTV ranking [skip ci]"
          git push
